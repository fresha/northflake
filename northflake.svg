<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="frost" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8fbcbb"/>
      <stop offset="45%" stop-color="#88c0d0"/>
      <stop offset="100%" stop-color="#81a1c1"/>
    </linearGradient>
  </defs>
  <g stroke="url(#frost)" stroke-width="3.2" stroke-linecap="round" fill="none">
    <g id="arm">
      <line x1="50" y1="50" x2="50" y2="8"/>
      <line x1="50" y1="20" x2="40" y2="11"/>
      <line x1="50" y1="20" x2="60" y2="11"/>
      <line x1="50" y1="32" x2="42" y2="24"/>
      <line x1="50" y1="32" x2="58" y2="24"/>
    </g>
    <use href="#arm" transform="rotate(60 50 50)"/>
    <use href="#arm" transform="rotate(120 50 50)"/>
    <use href="#arm" transform="rotate(180 50 50)"/>
    <use href="#arm" transform="rotate(240 50 50)"/>
    <use href="#arm" transform="rotate(300 50 50)"/>
  </g>
  <circle cx="50" cy="50" r="4.2" fill="url(#frost)"/>
</svg>
